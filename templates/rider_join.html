<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ReDrive &middot; Rider</title>
<link rel="stylesheet" href="/public/css/rider_join.css">
</head>
<body>
<h1>ReDrive</h1>
<p class="sub">Room <strong style="color:var(--accent);letter-spacing:.1em">{{ code }}</strong></p>

<div class="card" id="bridge-card">
  <h2>ReStim Bridge</h2>
  <div class="bridge-row">
    <span class="b-label">Session</span>
    <span id="srv-dot" class="bdot"></span>
    <span id="srv-txt" class="b-status">connecting…</span>
  </div>
  <div class="bridge-row">
    <span class="b-label">ReStim</span>
    <span id="rs-dot" class="bdot"></span>
    <span id="rs-txt" class="b-status">connecting…</span>
  </div>
  <details class="bridge-adv">
    <summary>ReStim address</summary>
    <div style="display:flex;gap:.5rem;margin-top:.5rem">
      <input id="restim-url-input" value="ws://localhost:12346/tcode"
             style="flex:1;font-size:.82rem;background:var(--bg3);color:var(--fg);
                    border:1px solid var(--border);border-radius:4px;padding:.3rem .6rem">
      <button class="bridge-reconnect-btn" onclick="reconnect()">Apply</button>
    </div>
    <p style="font-size:.78rem;color:var(--fg2);margin-top:.4rem">
      Default: <code>ws://localhost:12346/tcode</code>
      — make sure ReStim's WebSocket server is enabled.
    </p>
  </details>
</div>

<div class="card">
  <h2>Live output &nbsp;<span id="status-dot"></span><span id="status-txt"></span></h2>
  <div class="stat-row">
    <span class="stat-label">Pattern</span>
    <span class="stat-value" id="s-pattern">—</span>
  </div>
  <div class="stat-row">
    <span class="stat-label">Intensity</span>
    <span class="stat-value" id="s-intensity">—</span>
  </div>
  <div class="stat-row">
    <span class="stat-label">Output</span>
    <div id="vol-bar-wrap"><div id="vol-bar"></div></div>
    <span class="stat-value" id="s-vol">—</span>
  </div>
  <div class="stat-row" id="ramp-row">
    <span class="stat-label">Ramp</span>
    <div id="ramp-bar-wrap"><div id="ramp-bar"></div></div>
    <span class="stat-value" id="s-ramp">—</span>
  </div>
</div>

<div id="bottle-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.93);z-index:9999;flex-direction:column;align-items:center;justify-content:center;gap:1rem">
  <img src="/bottle.png" style="max-width:80vmin;max-height:72vmin;object-fit:contain;border-radius:8px">
  <div id="bottle-cd" style="color:#fff;font-size:1.1rem;font-family:monospace;opacity:0.7"></div>
</div>

<script>
const ROOM_CODE   = '{{ code }}';
const PREFIX      = '{{ prefix }}';
const RIDER_WS    = (location.protocol === 'https:' ? 'wss:' : 'ws:') + '//' + location.host + PREFIX + '/rider-ws';
</script>
<script src="/public/js/rider_join.js"></script>
<script src='https://storage.ko-fi.com/cdn/scripts/overlay-widget.js'></script>
<script>
  kofiWidgetOverlay.draw('stimstation', {
    'type': 'floating-chat',
    'floating-chat.donateButton.text': 'Support Us',
    'floating-chat.donateButton.background-color': '#d9534f',
    'floating-chat.donateButton.text-color': '#fff'
  });
</script>
</body>
</html>
